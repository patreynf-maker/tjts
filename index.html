<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Aplicación de conciliación de pagos - Compara cobros de Debo, Clover, AppyPF y MeLi" />
  <title>Conciliación de Pagos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./vite.svg" />
  <script type="module" crossorigin src="./assets/index-JbV7Axwv.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C0nPjlkB.css">
</head>

<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
              <rect width="32" height="32" rx="8" fill="url(#grad1)" />
              <path d="M8 16L14 22L24 10" stroke="white" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round" />
              <defs>
                <linearGradient id="grad1" x1="0" y1="0" x2="32" y2="32">
                  <stop offset="0%" stop-color="#6366f1" />
                  <stop offset="100%" stop-color="#8b5cf6" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div>
            <h1>Conciliación de Pagos</h1>
            <p class="subtitle">Comparación y clasificación de cobros</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="mode-toggle-container">
            <div class="mode-pill-toggle" id="mode-toggle">
              <div class="mode-pill-bg"></div>
              <button class="mode-pill-btn active" data-mode="playa">⛽ Playa</button>
              <button class="mode-pill-btn" data-mode="shop">🛒 Shop</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-grid">
        <!-- Step 1: Turnos -->
        <section class="card step-card" id="step1-card">
          <div class="card-header">
            <span class="step-badge">1</span>
            <h2>Turnos</h2>
            <button class="btn-icon" id="btn-add-turno" title="Agregar turno">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
            </button>
          </div>

          <div class="turnos-header">
            <span>Ref</span>
            <span>Fecha</span>
            <span>Turno</span>
            <span>Inicio</span>
            <span>Fin</span>
            <span></span>
          </div>
          <div id="turnos-container">
            <!-- Turno rows will be added here dynamically -->
          </div>
        </section>

        <!-- Step 2: File Upload (compact) -->
        <section class="card step-card" id="step2-card">
          <div class="card-header">
            <span class="step-badge">2</span>
            <h2>Cargar Archivos</h2>
          </div>
          <div class="upload-row">
            <div class="upload-chip" id="upload-debo" data-source="debo">
              <span class="chip-dot debo"></span>
              <span class="chip-label">DEBO</span>
              <span class="chip-hint">.txt</span>
              <span class="chip-status" id="status-debo"></span>
              <input type="file" id="file-debo" accept=".txt,.csv,.tsv" hidden />
            </div>
            <div class="upload-chip" id="upload-clover" data-source="clover">
              <span class="chip-dot clover"></span>
              <span class="chip-label">CLOVER</span>
              <span class="chip-hint">.csv</span>
              <span class="chip-status" id="status-clover"></span>
              <input type="file" id="file-clover" accept=".csv" hidden />
            </div>
            <div class="upload-chip" id="upload-appypf" data-source="appypf">
              <span class="chip-dot appypf"></span>
              <span class="chip-label">APPYPF</span>
              <span class="chip-hint">.xlsx</span>
              <input type="file" id="file-appypf" accept=".csv,.xlsx" hidden />
              <span class="chip-status" id="status-appypf"></span>
            </div>
            <div class="upload-chip" id="upload-meli" data-source="meli">
              <span class="chip-dot meli"></span>
              <span class="chip-label">MERCADOPAGO</span>
              <span class="chip-hint">.xlsx</span>
              <input type="file" id="file-meli" accept=".csv,.xlsx,.xls" hidden />
              <span class="chip-status" id="status-meli"></span>
            </div>
            <div class="upload-chip" id="upload-pedidosya" data-source="pedidosya" style="display: none;">
              <span class="chip-dot pedidosya" style="background: #e11932;"></span>
              <span class="chip-label">PEDIDOS YA</span>
              <span class="chip-hint">.xlsx</span>
              <input type="file" id="file-pedidosya" accept=".csv,.xlsx,.xls" hidden />
              <span class="chip-status" id="status-pedidosya"></span>
            </div>
          </div>
        </section>
      </div>

      <!-- Action Row -->
      <div class="action-row" style="display: flex; justify-content: center; margin-bottom: var(--space-md);">
        <button class="btn-primary" id="btn-calcular-planillas" style="min-width: 200px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round">
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
            </path>
            <polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline>
            <polyline points="7.5 19.79 7.5 14.6 3 12"></polyline>
            <polyline points="21 12 16.5 14.6 16.5 19.79"></polyline>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          Calcular Planillas
        </button>
      </div>

      <!-- Reconciliation Dashboard (Main View) -->
      <section id="reconcile-dashboard" class="reconcile-dashboard-section"
        style="display: none; margin-bottom: var(--space-xl);">
        <div class="card">
          <div class="card-header">
            <span class="step-badge" style="background: var(--accent-primary);">3</span>
            <h2>Panel de Conciliación</h2>
          </div>
          <div id="reconcile-container" class="reconcile-grid">
            <div class="reconcile-placeholder">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 3h5v5M8 21H3v-5M21 3L14 10M3 21l7-7" />
                <path d="M14 14l7 7M10 10L3 3" />
              </svg>
              <p>Complete la asignación de planillas para ver los resultados aquí.</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Toast container -->
    <div id="toast-container"></div>
  </div>

</body>

</html>
